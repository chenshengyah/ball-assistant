services:
  postgres:
    image: postgres:16-alpine
    container_name: ball-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ball_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: ball-assistant-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
